<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test POO - 50 Preguntas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            background: #333;
            border-radius: 10px;
            height: 25px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 14px;
        }
        
        .question {
            background: #1e2a3a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #00d9ff;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .question-number {
            background: #00d9ff;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .question-type {
            background: #ff6b6b;
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8em;
        }
        
        .question-type.theory {
            background: #4ecdc4;
        }
        
        .question-type.practice {
            background: #ff9f43;
        }
        
        .question-text {
            font-size: 1.1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .code-block {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid #333;
            white-space: pre;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            background: #2a3a4a;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        
        .option:hover {
            background: #3a4a5a;
            border-color: #00d9ff;
        }
        
        .option.selected {
            background: #1a4a5a;
            border-color: #00d9ff;
        }
        
        .option.correct {
            background: #1a5a3a;
            border-color: #00ff88;
        }
        
        .option.incorrect {
            background: #5a1a1a;
            border-color: #ff4444;
        }
        
        .option-letter {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #444;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            font-weight: bold;
        }
        
        .option.selected .option-letter {
            background: #00d9ff;
            color: #000;
        }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 30px;
        }
        
        .submit-btn:hover {
            transform: scale(1.02);
        }
        
        .results {
            display: none;
            background: #1e2a3a;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        
        .score {
            font-size: 4em;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .score-text {
            font-size: 1.5em;
            color: #888;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-value.correct-stat {
            color: #00ff88;
        }
        
        .stat-value.incorrect-stat {
            color: #ff4444;
        }
        
        .review-btn {
            padding: 15px 30px;
            background: #4ecdc4;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
            color: #000;
            font-weight: bold;
        }
        
        .review-btn:hover {
            background: #3dbdb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test POO - Programación Orientada a Objetos</h1>

        </div>

        </form>
        
        <button type="button" class="submit-btn" onclick="calcularResultado()">Ver Resultados</button>

            <h2>¡Test Completado!</h2>
            <div class="score" id="score">0</div>
            <div class="score-text">puntos sobre 50</div>
            
            <div class="stats">

                    <div>Correctas</div>
                </div>
                <div class="stat">
                    <div class="stat-value incorrect-stat" id="incorrectas">0</div>

            <button type="button" class="review-btn" onclick="mostrarRespuestas()">Ver Respuestas</button>
            <button type="button" class="review-btn" onclick="reiniciarTest()">Reiniciar Test</button>

                enunciado: "¿Qué es el principio de responsabilidad única?",
                opciones: [
                    "Cada clase debe tener un solo constructor",
                    "Cada clase debe tener una sola responsabilidad",
                    "Cada método debe hacer una sola cosa",
                    "Solo se puede heredar de una clase"
                ],
                correcta: 1
            },
            {
                tipo: "teoria",
                enunciado: "¿Qué significa 'bajo acoplamiento'?",
                opciones: [
                    "Que las clases tienen muchos métodos",
                    "Que las clases dependen poco unas de otras",
                    "Que hay poca herencia",
                    "Que el código es pequeño"
                ],
                correcta: 1
            },
            {
                tipo: "teoria",
                enunciado: "¿Qué significa 'alta cohesión'?",
                opciones: [
                    "Que una clase tiene muchos atributos",
                    "Que cada clase tiene una misión clara y focused",
                    "Que hay mucha herencia",
                    "Que el código es difícil de mantener"
                ],
                correcta: 1
            },
            {
                tipo: "practica",
                enunciado: "¿Cuál es la salida?",
                codigo: `ArrayList<String> lista = new ArrayList<>();
lista.add("X");
lista.add("Y");
lista.add("Z");
lista.set(1, "W");
for (String s : lista) {
    System.out.print(s);
}`,
                opciones: ["XYZ", "XWZ", "WYZ", "XZ"],
                correcta: 1
            },
            {
                tipo: "practica",
                enunciado: "¿Qué retorna contains() en un HashSet?",
                codigo: `HashSet<Integer> set = new HashSet<>();
set.add(1);
set.add(2);
set.add(3);
System.out.println(set.contains(2));`,
                opciones: ["true", "false", "2", "null"],
                correcta: 0
            }
        ];

        // Generar preguntas dinámicamente
        const form = document.getElementById('testForm');
        const letras = ['A', 'B', 'C', 'D'];

        preguntas.forEach((preg, index) => {
            const div = document.createElement('div');
            div.className = 'question';
            div.id = `pregunta-${index}`;
            
            const tipoHTML = preg.tipo === 'teoria' ? 'Teoría' : 'Práctica';
            
            let html = `
                <div class="question-header">
                    <span class="question-number">Pregunta ${index + 1}</span>
                    <span class="question-type ${preg.tipo}">${tipoHTML}</span>
                </div>
                <div class="question-text">${preg.enunciado}</div>
            `;
            
            if (preg.codigo) {
                html += `<div class="code-block">${preg.codigo}</div>`;
            }
            
            html += '<div class="options">';
            
            preg.opciones.forEach((opcion, opIndex) => {
                html += `
                    <div class="option" onclick="seleccionarOpcion(${index}, ${opIndex})">
                        <span class="option-letter">${letras[opIndex]}</span>
                        ${opcion}
                    </div>
                `;
            });
            
            html += '</div>';
            div.innerHTML = html;
            form.appendChild(div);
        });

        let respuestas = new Array(50).fill(null);

        function seleccionarOpcion(pregIndex, opIndex) {
            const opciones = document.querySelectorAll(`#pregunta-${pregIndex} .option`);
            opciones.forEach(op => op.classList.remove('selected'));
            opciones[opIndex].classList.add('selected');
            respuestas[pregIndex] = opIndex;
            actualizarProgreso();
        }

        function actualizarProgreso() {
            const contestadas = respuestas.filter(r => r !== null).length;
            const porcentaje = (contestadas / 50) * 100;
            document.getElementById('progress').style.width = porcentaje + '%';
            document.getElementById('progress').textContent = `${contestadas}/50`;
        }

        function calcularResultado() {
            let correctas = 0;
            
            preguntas.forEach((preg, index) => {
                const opciones = document.querySelectorAll(`#pregunta-${index} .option`);
                
                opciones.forEach((op, opIndex) => {
                    op.classList.remove('selected', 'correct', 'incorrect');
                    
                    if (opIndex === preg.correcta) {
                        op.classList.add('correct');
                    }
                    
                    if (respuestas[index] === opIndex && opIndex !== preg.correcta) {
                        op.classList.add('incorrect');
                    }
                });
                
                if (respuestas[index] === preg.correcta) {
                    correctas++;
                }
            });

            document.getElementById('score').textContent = correctas;
            document.getElementById('correctas').textContent = correctas;
            document.getElementById('incorrectas').textContent = 50 - correctas;
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function mostrarRespuestas() {
            preguntas.forEach((preg, index) => {
                const opciones = document.querySelectorAll(`#pregunta-${index} .option`);
                opciones.forEach((op, opIndex) => {
                    if (opIndex === preg.correcta) {
                        op.classList.add('correct');
                    }
                });
            });
        }

        function reiniciarTest() {
            respuestas = new Array(50).fill(null);
            document.querySelectorAll('.option').forEach(op => {
                op.classList.remove('selected', 'correct', 'incorrect');
            });
            actualizarProgreso();
            document.getElementById('results').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
