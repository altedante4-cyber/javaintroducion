        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                let optionsHTML = q.options.map((opt, i) => `
                    <div class="option" onclick="selectOption(${index}, ${i})">
                        <div class="option-marker">${String.fromCharCode(65 + i)}</div>
                        <div>${opt}</div>
                    </div>
                `).join('');
                
                card.innerHTML = `
                    <div class="question-text">
                        <span class="question-number">${index + 1}</span>
                        ${q.question}
                    </div>
                    <div class="options">${optionsHTML}</div>
                `;
                
                container.appendChild(card);
            });
        }

        function selectOption(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            
            const options = document.querySelectorAll('.question-card')[questionIndex].querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === optionIndex) {
                    opt.classList.add('selected');
                }
            });
            
            updateStats();
        }

        function updateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            document.getElementById('currentQ').textContent = answered + 1;
        }

        function submitExam() {
            let correct = 0;
            let incorrect = 0;
            
            questions.forEach((q, index) => {
                const options = document.querySelectorAll('.question-card')[index].querySelectorAll('.option');
                
                if (userAnswers[index] === q.correct) {
                    correct++;
                    options[q.correct].classList.add('correct');
                } else if (userAnswers[index] !== null) {
                    incorrect++;
                    options[userAnswers[index]].classList.add('incorrect');
                    options[q.correct].classList.add('correct');
                }
                
                options.forEach(opt => opt.style.pointerEvents = 'none');
            });
            
            correctAnswers = correct;
            
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('scoreDisplay').textContent = `${correct}/50`;
            document.getElementById('correctStat').textContent = correct;
            document.getElementById('incorrectStat').textContent = incorrect;
            document.getElementById('percentageStat').textContent = `${(correct * 2)}%`;
            
            if (correct < 25) {
                document.getElementById('scoreDisplay').classList.add('fail');
            }
            
            document.getElementById('results').classList.add('show');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Examen Finalizado';
        }

        renderQuestions();
    </script>
</body>
</html>
