    <div id="mostrar"></div>
<script>
     const nombres = ['Ana', 'Carlos', 'Maria', 'Juan', 'Sofia'];

    const mostrar_elementos = document.getElementById('mostrar')

        html +=`<li>${nombre}</li>`
    }
    html +="</ul>"

    mostrar_elementos.innerHTML=html;


        

</script>
