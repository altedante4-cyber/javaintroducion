<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="mi-formulario">
    <input type="text" value="Hola">
    <select>
        <option selected>Opción 1</option>
    </select>
    <textarea>Texto</textarea>
</form>
<button id="btn-limpiar">Limpiar</button>

<script>
      const elementos = document.querySelectorAll('input,textarea')

    document.getElementById('btn-limpiar').addEventListener("click",function() {
           const formulario= document.getElementById('mi-formulario')

           formulario.querySelectorAll('input , textarea,select ').forEach(el =>  {
                if(el.type === 'checkbox' || el.type === 'radio'){

                     el.checked = false ;
                }else if ( el.tagName === 'SELECT'){
                     el.selectedIndex = -1 
                }else {
                     
                    el.value = ''
                }
              
           })
            
                


    })
    
</script>
</body>
</html>
