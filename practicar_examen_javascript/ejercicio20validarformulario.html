<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form id="form-registro">
    <input type="text" id="nombre" placeholder="Nombre">
    <span class="error" id="error-nombre"></span>
    
    <input type="email" id="correo" placeholder="Email">
    <span class="error" id="error-correo"></span>
    
    <input type="password" id="pass" placeholder="Password">
    <span class="error" id="error-pass"></span>
    
    <button type="submit">Registrarse</button>

    </form>

    <script>
        const formulario = document.getElementById('form-registro')
        const input_formulario = formulario.querySelectorAll('input')

        formulario.addEventListener('submit',function(e) {
             e.preventDefault()
             let correcto = true;

            input_formulario.forEach((elemento) => {
                if(elemento.type === "text"){
                    const nombre_validar = document.getElementById('error-nombre')

                    if(!validar_nombre(elemento)){
                        nombre_validar.textContent = "Error: el nombre no puede estar vacío o contener números"
                        correcto = false;
                    } else {
                        nombre_validar.textContent = ""
                    }

                } else if (elemento.type === "email"){
                    const email_validar = document.getElementById('error-correo')

                    if(!validar_email(elemento)){
                        email_validar.textContent = "Email inválido"
                        correcto = false;
                    } else {
                        email_validar.textContent = ""
                    }

                } else if (elemento.type === "password"){
                    const passwor_validar = document.getElementById('error-pass')

                    if(!validar_contrasena(elemento)){
                        passwor_validar.textContent = "El password es inválido"
                        correcto = false;
                    } else {
                        passwor_validar.textContent = ""
                    }
                }
            })

            if(correcto){
                alert("CORRECTO")
            }
        })
    
        function validar_nombre(nombre){
             const valor = nombre.value.trim();

             if (valor === "" || Number(valor)){

                return false;
            }

             return true ; 
             
        }

        function validar_email(email){
            const email_corre= email.value.trim()

            if(email_corre === "" ){
                 return false ; 
            }

            return true ; 
             
        }

        function validar_contrasena(password){
             const password_validar = password.value.trim();

             if(password_validar === ""){
                return false ;
             }

             return true ; 
        }

         
    </script>
</body>
</html>
