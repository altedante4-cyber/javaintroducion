<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form id="form-registro">
    <input type="text" id="nombre" placeholder="Nombre">
    <span class="error" id="error-nombre"></span>
    
    <input type="email" id="correo" placeholder="Email">
    <span class="error" id="error-correo"></span>
    
    <input type="password" id="pass" placeholder="Password">
    <span class="error" id="error-pass"></span>
    
    <button type="submit">Registrarse</button>

    </form>

    <script>
        const formulario = document.getElementById('form-registro');

        const campos = [
            {
                selector: '#nombre',
                error: '#error-nombre',
                mensaje: 'Error: el nombre no puede estar vacío o contener números',
                validar: v => v !== '' && !/\d/.test(v)
            },
            {
                selector: '#correo',
                error: '#error-correo',
                mensaje: 'Email inválido',
                validar: v => v !== ''
            },
            {
                selector: '#pass',
                error: '#error-pass',
                mensaje: 'El password es inválido',
                validar: v => v !== ''
            }
        ];

        formulario.addEventListener('submit', (e) => {
            e.preventDefault();
            let correcto = true;

            campos.forEach((campo) => {
                const input = document.querySelector(campo.selector);
                const error = document.querySelector(campo.error);
                const valor = input.value.trim();

                if (!campo.validar(valor)) {
                    error.textContent = campo.mensaje;
                    correcto = false;
                } else {
                    error.textContent = '';
                }
            });

            if (correcto) alert('CORRECTO');
        });
    </script>
</body>
</html>
