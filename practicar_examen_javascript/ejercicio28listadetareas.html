<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <style>
        .completada {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    
    <input type="text" id="tarea-input" placeholder="Nueva tarea">
    <button id="btn-agregar">Agregar</button>
    <ul id="lista-tareas"></ul>
    <p>Pendientes: <span id="contador">0</span></p>


<script>
     
     const input = document.getElementById('tarea-input')
     const lista_tareas_ul = document.getElementById('lista-tareas')
     const contador_span = document.getElementById('contador')
     const btn_agregar = document.getElementById('btn-agregar')

     function actualizarContador() {
         const pendientes = lista_tareas_ul.querySelectorAll('li:not(.completada)').length
         contador_span.textContent = pendientes
     }

     function agregarTarea() {
         const texto = input.value.trim()
         if (texto === '') return

         const li = document.createElement('li')
         li.textContent = texto

         const checkbox = document.createElement('input')
         checkbox.type = 'checkbox'
         checkbox.addEventListener('change', function() {
             if (this.checked) {
                 li.classList.add('completada')
             } else {
                 li.classList.remove('completada')
             }
             actualizarContador()
         })

         const btnEliminar = document.createElement('button')
         btnEliminar.textContent = 'Eliminar'
         btnEliminar.addEventListener('click', function() {
             lista_tareas_ul.removeChild(li)
             actualizarContador()
         })

         li.appendChild(checkbox)
         li.appendChild(btnEliminar)
         lista_tareas_ul.appendChild(li)
         
         input.value = ''
         actualizarContador()
     }

     btn_agregar.addEventListener('click', agregarTarea)

     input.addEventListener('keypress', function(e) {
         if (e.key === 'Enter') {
             agregarTarea()
         }
     })

</script>
</body>
</html>
