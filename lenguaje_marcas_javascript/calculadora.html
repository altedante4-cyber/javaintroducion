<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="contenedor">
        <h1>Calculadora</h1>
        <div class="inputs">
            <input type="number" id="num1" placeholder="Primer número">
            <input type="number" id="num2" placeholder="Segundo número">
        </div>
        <div class="botones">
            <button id="btnSumar">Sumar</button>
            <button id="btnRestar">Restar</button>
            <button id="btnMultiplicar">Multiplicar</button>
            <button id="btnDividir">Dividir</button>
        </div>
        <div id="resultado">Resultado: -</div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
