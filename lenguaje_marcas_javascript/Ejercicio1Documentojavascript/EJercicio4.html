<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="dias"></p>

    <script>

          const array_dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"]
           const parrafo = document.getElementById('dias')

       
           
           array_dias.forEach((Element) => {

            
             parrafo.innerHTML += Element + " "
           })



    </script>
    
</body>
</html>
