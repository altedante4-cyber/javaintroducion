function generar_cita_name(categoria){
    const sacamos_categoria_lista = []
    for (let i = 0 ; i < citas.length ; i++ ){
        
         //accedemos directamente al objto citas[i]
         if(citas[i].categoria === categoria ){
             sacamos_categoria_lista.push(citas[i]);
         }
    }

    let generamos_una_cita_alzar = Math.floor(Math.random() * sacamos_categoria_lista.length );

    return sacamos_categoria_lista[generamos_una_cita_alzar]
}
function sacar_categoria_nombre(elemento_select){
     let contenido = "";
     switch(elemento_select.value){

         case 'uno':
            contenido +="motivación"
            break 
         case 'dos':
            contenido += "motivación"
         break 

        case 'tres':
            contenido +="éxito"
         break 

         case 'cuatro':
            contenido += "ciencia"
         break 

        case 'cinco':
            contenido +="sabiduría"        
        break
        default :
            contenido +=""

     }

     return contenido ; 
}
