<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Validación Registro</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;
            box-sizing: border-box;
        }
        .error { color: red; font-size: 12px; display: none; margin-top: 5px; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h2>Formulario de Registro</h2>
    <form id="registroForm" novalidate>
        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre">
            <div class="error" id="error-nombre"></div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
            <div class="error" id="error-email"></div>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password">
            <div class="error" id="error-password"></div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirmar contraseña</label>
            <input type="password" id="confirmPassword" name="confirmPassword">
            <div class="error" id="error-confirmPassword"></div>
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono">
            <div class="error" id="error-telefono"></div>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="terminos" name="terminos">
                Acepto los términos y condiciones
            </label>
            <div class="error" id="error-terminos"></div>
        </div>

        <button type="submit">Registrarse</button>
    </form>

    <script>
        const form = document.getElementById('registroForm');
        const nombre = document.getElementById('nombre');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const telefono = document.getElementById('telefono');
        const terminos = document.getElementById('terminos');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let errores = false;

            // Validar nombre
            if(!validarNombre(nombre)){
                mostrarError('error-nombre', 'Nombre inválido (mínimo 3 letras, solo letras y espacios)');
                errores = true;
            } else {
                ocultarError('error-nombre');
            }

            // Validar email
            if(!validarEmail(email)){
                mostrarError('error-email', 'Email inválido');
                errores = true;
            } else {
                ocultarError('error-email');
            }

            // Validar contraseña
            if(!validarContrasena(password)){
                mostrarError('error-password', 'Contraseña inválida (mínimo 8 caracteres, 1 mayúscula, 1 minúscula, 1 número)');
                errores = true;
            } else {
                ocultarError('error-password');
            }

            // Validar confirmación de contraseña
            if(confirmPassword.value !== password.value){
                mostrarError('error-confirmPassword', 'Las contraseñas no coinciden');
                errores = true;
            } else {
                ocultarError('error-confirmPassword');
            }

            // Validar teléfono
            if(!validarTelefono(telefono)){
                mostrarError('error-telefono', 'Teléfono inválido (9 dígitos, empieza por 6,7,8 o 9)');
                errores = true;
            } else {
                ocultarError('error-telefono');
            }

            // Validar checkbox términos
            if(!validarTerminos(terminos)){
                mostrarError('error-terminos', 'Debes aceptar los términos');
                errores = true;
            } else {
                ocultarError('error-terminos');
            }

            if(!errores){
                alert('Formulario válido y enviado');
                form.submit();
            }
        });

        function mostrarError(id, mensaje){
            const errorDiv = document.getElementById(id);
            errorDiv.innerText = mensaje;
            errorDiv.style.display = 'block';
        }

        function ocultarError(id){
            const errorDiv = document.getElementById(id);
            errorDiv.innerText = '';
            errorDiv.style.display = 'none';
        }

        function validarNombre(input){
            const valor = input.value.trim();
            const regex = /^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$/;
            return valor.length >= 3 && regex.test(valor);
        }

        function validarEmail(input){
            const valor = input.value.trim();
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return valor !== "" && regexEmail.test(valor);
        }

        function validarContrasena(input){
            const valor = input.value.trim();
            const regexMayuscula = /[A-Z]/;
            const regexMinuscula = /[a-z]/;
            const regexNumero = /[0-9]/;
            return valor.length >= 8 && regexMayuscula.test(valor) && regexMinuscula.test(valor) && regexNumero.test(valor);
        }

        function validarTelefono(input){
            const valor = input.value.trim();
            const regexTelefono = /^[6789]\d{8}$/;
            return regexTelefono.test(valor);
        }

        function validarTerminos(checkbox){
            return checkbox.checked;
        }
    </script>
</body>
</html>
